<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ask Pratyush</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background-color: #080808;
      background-image:
        linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
      background-size: 30px 30px;
      color: #e5e5e5;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 3rem 1rem 2rem;
    }

    .wrap {
      width: 100%;
      max-width: 660px;
    }

    /* Hero */
    .hero {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    .avatar-ring {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border: 1px solid #2e2e2e;
      background: #1a1a1a;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 0.75rem;
      overflow: hidden;
      box-shadow: 0 0 30px rgba(77, 166, 255, 0.12);
    }

    .avatar-ring img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .hero h1 {
      font-size: 18px;
      font-weight: 500;
      color: #f0f0f0;
      margin-bottom: 4px;
    }

    .hero p {
      font-size: 13px;
      color: #666;
    }

    /* Pills */
    .pills {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
      margin-bottom: 1.5rem;
    }

    .pill {
      font-size: 12px;
      padding: 5px 13px;
      border-radius: 20px;
      border: 1px solid #2a2a2a;
      background: rgba(26, 26, 26, 0.85);
      color: #777;
      cursor: pointer;
      transition: 0.15s;
      backdrop-filter: blur(4px);
    }

    .pill:hover {
      border-color: #444;
      color: #ddd;
    }

    /* Chat */
    .chat-box {
      min-height: 320px;
      max-height: 420px;
      overflow-y: auto;
      padding: 1rem 0;
      margin-bottom: 1rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      scrollbar-width: thin;
      scrollbar-color: #2a2a2a transparent;
    }

    .chat-box:empty::after {
      content: "Ask me anything — projects, skills, experience...";
      display: block;
      text-align: center;
      color: #383838;
      font-size: 14px;
      margin-top: 80px;
    }

    /* Bubbles */
    .bubble-wrap {
      display: flex;
      gap: 10px;
      align-items: flex-start;
    }

    .bubble-wrap.user {
      flex-direction: row-reverse;
    }

    .bubble-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: #141414;
      border: 1px solid #2a2a2a;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 500;
      color: #555;
      flex-shrink: 0;
    }

    .bubble {
      max-width: 80%;
      font-size: 14px;
      line-height: 1.6;
      padding: 10px 14px;
      border: 1px solid #222;
    }

    .bubble.user {
      background: rgba(26, 26, 26, 0.9);
      color: #e5e5e5;
      border-radius: 12px 12px 4px 12px;
      backdrop-filter: blur(4px);
    }

    .bubble.bot {
      background: rgba(14, 14, 14, 0.85);
      color: #d5d5d5;
      border-radius: 12px 12px 12px 4px;
      backdrop-filter: blur(4px);
    }

    .bubble.loading {
      color: #444;
      font-style: italic;
    }

    /* Input */
    .input-row {
      display: flex;
      gap: 8px;
      align-items: center;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 6px 6px 6px 14px;
      background: rgba(14, 14, 14, 0.9);
      backdrop-filter: blur(6px);
      transition: border-color 0.15s;
    }

    .input-row:focus-within {
      border-color: #3a3a3a;
    }

    .input-row input {
      flex: 1;
      border: none;
      outline: none;
      background: transparent;
      font-size: 14px;
      color: #e5e5e5;
      font-family: inherit;
    }

    .input-row input::placeholder {
      color: #3a3a3a;
    }

    .send-btn {
      width: 50px;
      height: 36px;
      border-radius: 8px;
      border: 1px solid #2a2a2a;
      background: #1a1a1a;
      color: #555;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-family: inherit;
      letter-spacing: 0.01em;
      transition: all 0.15s ease;
    }

    .send-btn:hover {
      border-color: #444;
      color: #e5e5e5;
      background: #222;
    }

    .input-row:focus-within .send-btn {
      border-color: #4da6ff;
      color: #4da6ff;
    }
  </style>
</head>
<body>

<div class="wrap">

  <div class="hero">
    <div class="avatar-ring">
      <img src="profile.jpg" alt="Pratyush" onerror="this.style.display='none'; this.parentElement.textContent='P'" />
    </div>
    <h1>Pratyush Khengle</h1>
    <p>Agentic AI Engineer · Ask me anything</p>
  </div>

  <div class="pills">
    <span class="pill" onclick="quick('What projects have you built?')">Projects</span>
    <span class="pill" onclick="quick('What are your technical skills?')">Skills</span>
    <span class="pill" onclick="quick('Tell me about your work experience')">Experience</span>
    <span class="pill" onclick="quick('Tell me about your education')">Education</span>
    <span class="pill" onclick="quick('What roles are you open to?')">Hiring</span>
  </div>

  <div class="chat-box" id="chat"></div>

  <div class="input-row">
    <input id="input" placeholder="Ask a question..." autofocus />
    <button class="send-btn" onclick="send()">Send</button>
  </div>

</div>

<script>
function typeText(el, text, speed) {
  speed = speed || 12;
  let i = 0;
  function tick() {
    if (i < text.length) {
      el.textContent += text[i++];
      el.closest('.chat-box').scrollTop = 999999;
      setTimeout(tick, text.length > 300 ? 4 : speed);
    }
  }
  tick();
}

function appendBubble(role, text, isLoading) {
  const chat = document.getElementById('chat');
  const wrap = document.createElement('div');
  wrap.className = 'bubble-wrap ' + role;

  const av = document.createElement('div');
  av.className = 'bubble-avatar';
  av.textContent = role === 'user' ? 'You' : 'P';

  const b = document.createElement('div');
  b.className = 'bubble ' + role + (isLoading ? ' loading' : '');
  if (text) b.textContent = text;

  if (role === 'user') {
    wrap.appendChild(b);
    wrap.appendChild(av);
  } else {
    wrap.appendChild(av);
    wrap.appendChild(b);
  }

  chat.appendChild(wrap);
  chat.scrollTop = 999999;
  return b;
}

async function send(customQuery) {
  const input = document.getElementById('input');
  const query = customQuery || input.value.trim();
  if (!query) return;
  input.value = '';

  appendBubble('user', query);
  const loadingEl = appendBubble('bot', 'Thinking…', true);

  try {
    const res = await fetch('/chat?q=' + encodeURIComponent(query));
    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.detail || 'Request failed');
    }
    const data = await res.json();
    loadingEl.classList.remove('loading');
    loadingEl.textContent = '';
    typeText(loadingEl, data.answer);
  } catch (err) {
    loadingEl.classList.remove('loading');
    loadingEl.textContent = err.message;
  }
}

function quick(text) { send(text); }

document.getElementById('input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') send();
});
</script>

</body>
</html>
