<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ask Pratyush</title>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0e0e0e;
      color: #e5e5e5;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 3rem 1rem 2rem;
    }

    .wrap {
      width: 100%;
      max-width: 660px;
    }

    .hero {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    /* FIXED avatar */
    .avatar-ring {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border: 1px solid #2e2e2e;
      background: #1a1a1a;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 0.75rem;
      overflow: hidden;
      box-shadow: 0 0 25px rgba(77, 166, 255, 0.15);
    }

    .avatar-ring img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .hero h1 {
      font-size: 18px;
      font-weight: 500;
      color: #f0f0f0;
      margin-bottom: 4px;
    }

    .hero p {
      font-size: 13px;
      color: #777;
    }

    .pills {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
      margin-bottom: 1.5rem;
    }

    .pill {
      font-size: 12px;
      padding: 5px 13px;
      border-radius: 20px;
      border: 1px solid #2a2a2a;
      background: #1a1a1a;
      color: #888;
      cursor: pointer;
      transition: 0.15s;
    }

    .pill:hover {
      border-color: #444;
      color: #ddd;
    }

    .chat-box {
      min-height: 320px;
      max-height: 420px;
      overflow-y: auto;
      padding: 1rem 0;
      margin-bottom: 1rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .chat-box:empty::after {
      content: "Ask me anything — projects, skills, experience...";
      text-align: center;
      color: #444;
      margin-top: 80px;
    }

    .bubble-wrap {
      display: flex;
      gap: 10px;
    }

    .bubble-wrap.user {
      flex-direction: row-reverse;
    }

    .bubble-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      color: #666;
    }

    .bubble {
      max-width: 80%;
      padding: 10px 14px;
      border: 1px solid #2a2a2a;
      font-size: 14px;
      line-height: 1.6;
    }

    .bubble.user {
      background: #1a1a1a;
      border-radius: 12px 12px 4px 12px;
    }

    .bubble.bot {
      background: #141414;
      border-radius: 12px 12px 12px 4px;
    }

    .bubble.loading {
      color: #555;
      font-style: italic;
    }

    .input-row {
      display: flex;
      gap: 8px;
      align-items: center;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 6px 6px 6px 14px;
      background: #141414;
    }

    .input-row input {
      flex: 1;
      border: none;
      outline: none;
      background: transparent;
      font-size: 14px;
      color: #e5e5e5;
    }

    /* FIXED BUTTON */
    .send-btn {
        width: 50px;
        height: 36px;
        border-radius: 8px;
        border: 1px solid #2a2a2a;
        background: #1a1a1a;
        color: #666;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 16px;
        transition: all 0.15s ease;
        }

        /* hover = subtle highlight */
    .send-btn:hover {
        border-color: #444;
        color: #e5e5e5;
        background: #222;
    }

        /* when typing (active feel) */
    .input-row:focus-within .send-btn {
        border-color: #4da6ff;
        color: #4da6ff;
    }
  </style>
</head>

<body>
<div class="wrap">

  <div class="hero">
    <div class="avatar-ring">
      <img src="profile.jpg" alt="Pratyush">
    </div>
    <h1>Pratyush Khengle</h1>
    <p>Agentic AI Engineer · Ask me anything</p>
  </div>

  <div class="pills">
    <span class="pill" onclick="quick('What projects have you built?')">Projects</span>
    <span class="pill" onclick="quick('What are your technical skills?')">Skills</span>
    <span class="pill" onclick="quick('Tell me about your work experience')">Experience</span>
    <span class="pill" onclick="quick('Tell me about your education')">Education</span>
    <span class="pill" onclick="quick('What roles are you open to?')">Hiring</span>
  </div>

  <div class="chat-box" id="chat"></div>

  <div class="input-row">
    <input id="input" placeholder="Ask a question..." autofocus />
    <button class="send-btn" onclick="send()">Send</button>
  </div>

</div>

<script>
function typeText(el, text, speed = 12) {
  let i = 0;
  function tick() {
    if (i < text.length) {
      el.textContent += text[i++];
      el.closest('.chat-box').scrollTop = 999999;
      setTimeout(tick, text.length > 300 ? 4 : speed);
    }
  }
  tick();
}

function appendBubble(role, text, isLoading) {
  const chat = document.getElementById('chat');
  const wrap = document.createElement('div');
  wrap.className = 'bubble-wrap ' + role;

  const av = document.createElement('div');
  av.className = 'bubble-avatar';
  av.textContent = role === 'user' ? 'You' : 'P';

  const b = document.createElement('div');
  b.className = 'bubble ' + role + (isLoading ? ' loading' : '');
  if (text) b.textContent = text;

  if (role === 'user') {
    wrap.appendChild(b);
    wrap.appendChild(av);
  } else {
    wrap.appendChild(av);
    wrap.appendChild(b);
  }

  chat.appendChild(wrap);
  chat.scrollTop = 999999;
  return b;
}

async function send(customQuery) {
  const input = document.getElementById('input');
  const query = customQuery || input.value.trim();
  if (!query) return;
  input.value = '';

  appendBubble('user', query);
  const loadingEl = appendBubble('bot', 'Thinking…', true);

  try {
    const res = await fetch('/chat?q=' + encodeURIComponent(query));
    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.detail || "Request failed");
    }
    const data = await res.json();
    loadingEl.classList.remove('loading');
    loadingEl.textContent = '';
    typeText(loadingEl, data.answer);
  } catch (err) {
    loadingEl.classList.remove('loading');
    loadingEl.textContent = err.message;
  }
}

function quick(text) { send(text); }

document.getElementById('input').addEventListener('keydown', e => {
  if (e.key === 'Enter') send();
});
</script>

</body>
</html>
